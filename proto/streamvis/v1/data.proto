syntax = "proto3";
package streamvis.v1;

option go_package = "pier/pb/streamvis/v1;streamvis_v1";

/*
import "google/protobuf/struct.proto";
*/
import "google/protobuf/timestamp.proto";

message CreateFieldRequest {
  string name = 1;
  string data_type = 2;
  string description = 3;
}

message CreateFieldResponse {
}

message CreateSeriesRequest {
  string series_name = 1;
  repeated string field_names = 2;
}

message CreateSeriesResponse {
}

message EncTyp {
  bytes base = 1;
  repeated uint32 shape = 2;
  oneof spans {
    IntValues ival = 3;
    FloatValues fval = 4;
  }
}

message IntValues {
  repeated OptionalInt values = 1;
}

message OptionalInt {
  optional int32 value = 1;
}

message FloatValues {
  repeated OptionalFloat values = 1;
}

message OptionalFloat {
  optional float value = 1;
}

message AppendToSeriesRequest {
  string series_handle = 1;
  string run_handle = 2;
  repeated string field_names = 3;
  repeated EncTyp field_vals = 4;
}

message AppendToSeriesResponse {
  bool success = 1;
}

message CreateRunRequest { }

message CreateRunResponse {
  string run_handle = 1;
}

message ReplaceRunRequest {
  string run_handle = 1;
}

message ReplaceRunResponse {
}

message DeleteRunRequest {
  string run_handle = 1;
}

message DeleteRunResponse {
  bool success = 1;
}

enum FieldDataType {
  FIELD_DATA_TYPE_UNSPECIFIED = 0;
  FIELD_DATA_TYPE_INT = 1;
  FIELD_DATA_TYPE_FLOAT = 2;
  FIELD_DATA_TYPE_STRING = 3;
  FIELD_DATA_TYPE_BOOL = 4;
}

message FieldValue {
  string handle = 1;
  FieldDataType data_type = 2;
  oneof value {
    int32 int_val = 3;
    float float_val = 4;
    string string_val = 5;
    bool bool_val = 6;
  }
}

message SetRunAttributesRequest {
  string run_handle = 1;
  repeated FieldValue attrs = 2;
}

message SetRunAttributesResponse {
}

message DeleteEmptySeriesRequest {
  string series_name = 1;
}

message DeleteEmptySeriesResponse {
}

message Field {
  string handle = 1;
  string name = 2;
  FieldDataType data_type = 3;
  string description = 4;
}

message ListSeriesRequest {}

message ListSeriesResponse {
  string series_name = 1;
  string series_handle = 2;
  repeated Field fields = 3;
}

message ListFieldsRequest {}

message ListRunsRequest {}

message ListRunsResponse {
  string run_handle = 1;
  repeated string tags = 2;
  google.protobuf.Timestamp started_at = 3;
  repeated FieldValue attrs = 4;
}


message IntList {
  repeated int32 vals = 1;
}

message IntRange {
  optional int32 imin = 1;
  optional int32 imax = 2;
}

message FloatRange {
  optional float fmin = 1;
  optional float fmax = 2;
}

message BoolList {
  repeated bool vals = 1;
}

message StringList {
  repeated string vals = 1;
}

message AttributeFilter {
  string attr_handle = 1;
  bool include_missing = 2;
  oneof value {
    IntRange int_range = 3;
    IntList int_list = 4;
    FloatRange float_range = 5;
    BoolList bool_list = 6;
    StringList string_list = 7;
  }
}

message TagFilter {
  oneof value {
    StringList has_any_tag = 1;
    StringList has_all_tags = 2;
  }
}



service Service {
  rpc CreateField (CreateFieldRequest) returns (CreateFieldResponse);
  rpc CreateSeries (CreateSeriesRequest) returns (CreateSeriesResponse);
  rpc AppendToSeries (AppendToSeriesRequest) returns (AppendToSeriesResponse);
  rpc CreateRun (CreateRunRequest) returns (CreateRunResponse);
  rpc ReplaceRun (ReplaceRunRequest) returns (ReplaceRunResponse);
  rpc DeleteRun (DeleteRunRequest) returns (DeleteRunResponse);
  rpc SetRunAttributes (SetRunAttributesRequest) returns (SetRunAttributesResponse);
  rpc DeleteEmptySeries (DeleteEmptySeriesRequest) returns (DeleteEmptySeriesResponse);
  rpc ListSeries (ListSeriesRequest) returns (stream ListSeriesResponse);
  rpc ListFields (ListFieldsRequest) returns (stream Field);
  rpc ListRuns (ListRunsRequest) returns (stream ListRunsResponse);
  // rpc ListFieldData (ListFieldDataRequest) returns (stream FieldDataResponse);
}
