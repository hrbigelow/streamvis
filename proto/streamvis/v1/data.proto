syntax = "proto3";
package streamvis.v1;

option go_package = "pier/pb/streamvis/v1;streamvis_v1";

/*
import "google/protobuf/struct.proto";
*/
import "google/protobuf/timestamp.proto";

message CreateFieldRequest {
  string name = 1;
  string data_type = 2;
  string description = 3;
}

message CreateFieldResponse {
}

message CreateSeriesRequest {
  string series_name = 1;
  repeated string field_names = 2;
}

message CreateSeriesResponse {
}

message EncTyp {
  string field_handle = 1;
  bytes base = 2;
  repeated uint32 shape = 3;
  oneof spans {
    IntValues int_spans = 4;
    FloatValues float_spans = 5;
    BoolArray bool_bcast = 6;
    BoolArray string_bcast = 7;
  }
}

message IntArray {
  repeated int32 values = 1;
}

message IntValues {
  repeated OptionalInt values = 1;
}

message OptionalInt {
  optional int32 value = 1;
}

message FloatArray {
  repeated float values = 2;
}

message FloatValues {
  repeated OptionalFloat values = 1;
}

message OptionalFloat {
  optional float value = 1;
}

message BoolArray {
  repeated bool values = 1;
}

message StringArray {
  repeated string values = 1;
}


message AppendToSeriesRequest {
  string series_handle = 1;
  string run_handle = 2;
  repeated EncTyp field_vals = 4;
}

message AppendToSeriesResponse {
}

message CreateRunRequest { }

message CreateRunResponse {
  string run_handle = 1;
}

message ReplaceRunRequest {
  string run_handle = 1;
}

message ReplaceRunResponse {
}

message DeleteRunRequest {
  string run_handle = 1;
}

message DeleteRunResponse {
}

enum FieldDataType {
  FIELD_DATA_TYPE_UNSPECIFIED = 0;
  FIELD_DATA_TYPE_INT = 1;
  FIELD_DATA_TYPE_FLOAT = 2;
  FIELD_DATA_TYPE_STRING = 3;
  FIELD_DATA_TYPE_BOOL = 4;
}

message FieldValue {
  string handle = 1;
  oneof value {
    int32 int_val = 2;
    float float_val = 3;
    string string_val = 4;
    bool bool_val = 5;
  }
}

message SetRunAttributesRequest {
  string run_handle = 1;
  repeated FieldValue attrs = 2;
}

message SetRunAttributesResponse {
}

message DeleteEmptySeriesRequest {
  string series_name = 1;
}

message DeleteEmptySeriesResponse {
}

message AddRunTagRequest {
  string run_handle = 1;
  string tag = 2;
}

message AddRunTagResponse {}

message DeleteRunTagRequest {
  string run_handle = 1;
  string tag = 2;
}

message DeleteRunTagResponse {}

message Field {
  string handle = 1;
  string name = 2;
  FieldDataType data_type = 3;
  string description = 4;
}

message ListAttributeValuesRequest {}

message AnyArray {
  oneof value {
    IntArray ints = 1;
    FloatArray floats = 2;
    StringArray strings = 3;
    BoolArray bools = 4;
  }
}

message AttributeValues {
  Field field = 1;
  AnyArray values = 2;
}


message Series {
  string handle = 1;
  string name = 2;
  repeated Field fields = 3;
}

message ListSeriesRequest {}

message ListFieldsRequest {}

message RunFilter {
  repeated AttributeFilter attribute_filters = 1;
  TagFilter tag_filter = 2;
  google.protobuf.Timestamp min_started_at = 3;
  google.protobuf.Timestamp max_started_at = 4;
}

message Run {
  string handle = 1;
  repeated string tags = 2;
  google.protobuf.Timestamp started_at = 3;
  repeated FieldValue attrs = 4;
  repeated string series_handles = 5;
}

message RunId {
  string handle = 1;
}

message ListStartedAtRequest {}

message RunStartTime {
  google.protobuf.Timestamp started_at = 3;
}

message ListTagsRequest {}

message TagValue {
  string tag = 1;
}

message ChunkData {
  string run_handle = 1;
  repeated EncTyp enc_vals = 2;
}

message IntList {
  repeated int32 vals = 1;
}

message IntRange {
  optional int32 imin = 1;
  optional int32 imax = 2;
}

message FloatRange {
  optional float fmin = 1;
  optional float fmax = 2;
}

message BoolList {
  repeated bool vals = 1;
}

message StringList {
  repeated string vals = 1;
}

message AttributeFilter {
  string field_handle = 1;
  bool include_missing = 2;
  oneof value {
    IntRange int_range = 3;
    IntList int_list = 4;
    FloatRange float_range = 5;
    BoolList bool_list = 6;
    StringList string_list = 7;
  }
}

message TagFilter {
  repeated string tags = 1;
  bool match_all = 2; // if true, a run with any tag in `tags` passes the filter 
}

message ListRunsRequest {
  RunFilter run_filter = 1;
}

message GetMaxChunkIdRequest {}

message GetMaxChunkIdResponse {
  int64 id = 1;
}

message QueryRunDataRequest {
  repeated string attr_handles = 1;
  repeated string coord_handles = 2;
  optional int64 min_chunk_id = 3;
  optional int64 max_chunk_id = 4;
  RunFilter run_filter = 5;
}

message ListCommonAttributesRequest {
  RunFilter run_filter = 1;
}

message ListCommonSeriesRequest {
  RunFilter run_filter = 1;
}


service Service {
  rpc CreateField (CreateFieldRequest) returns (CreateFieldResponse);
  rpc CreateSeries (CreateSeriesRequest) returns (CreateSeriesResponse);
  rpc AppendToSeries (AppendToSeriesRequest) returns (AppendToSeriesResponse);
  rpc CreateRun (CreateRunRequest) returns (CreateRunResponse);
  rpc ReplaceRun (ReplaceRunRequest) returns (ReplaceRunResponse);
  rpc DeleteRun (DeleteRunRequest) returns (DeleteRunResponse);
  rpc SetRunAttributes (SetRunAttributesRequest) returns (SetRunAttributesResponse);
  rpc DeleteEmptySeries (DeleteEmptySeriesRequest) returns (DeleteEmptySeriesResponse);
  rpc AddRunTag (AddRunTagRequest) returns (AddRunTagResponse);
  rpc DeleteRunTag (DeleteRunTagRequest) returns (DeleteRunTagResponse);
  rpc ListSeries (ListSeriesRequest) returns (stream Series);
  rpc ListFields (ListFieldsRequest) returns (stream Field);
  rpc ListRuns (ListRunsRequest) returns (stream Run);
  rpc GetMaxChunkId (GetMaxChunkIdRequest) returns (GetMaxChunkIdResponse);
  rpc QueryRunData (QueryRunDataRequest) returns (stream ChunkData);
  rpc ListCommonAttributes (ListCommonAttributesRequest) returns (stream Field);
  rpc ListCommonSeries (ListCommonSeriesRequest) returns (stream Series);
  rpc ListStartedAt (ListStartedAtRequest) returns (stream RunStartTime);
  rpc ListTags (ListTagsRequest) returns (stream TagValue);
  rpc ListAttributeValues (ListAttributeValuesRequest) returns (stream AttributeValues);
}
