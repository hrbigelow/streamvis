syntax = "proto3";
package streamvis.v1;

option go_package = "pier/pb/streamvis/v1;streamvis_v1";

import "google/protobuf/struct.proto";
/*
import "google/protobuf/timestamp.proto";
*/


message GetScopeRequest {
  string scope_name = 1;
  bool delete_existing = 2;
}

message GetScopeResponse {
  string scope_handle = 1;
}

message DeleteScopeRequest {
  string scope_handle = 1;
}

message DeleteScopeResponse {
  bool deleted = 1;
}

message GetSeriesRequest {
  string scope_handle = 1;
  string series_name = 2;
  map<string, string> structure = 3;
  bool delete_existing = 4;
}

message GetSeriesResponse {
  string series_handle = 1;
}

message EncTyp {
  bytes base = 1;
  repeated uint32 shape = 2;
  oneof spans {
    IntValues ival = 3;
    FloatValues fval = 4;
  }
}

message IntValues {
  repeated OptionalInt values = 1;
}

message OptionalInt {
  optional int32 value = 1;
}

message FloatValues {
  repeated OptionalFloat values = 1;
}

message OptionalFloat {
  optional float value = 1;
}

message AppendToSeriesRequest {
  string series_handle = 1;
  repeated string field_names = 2;
  repeated EncTyp field_vals = 3;
}

message AppendToSeriesResponse {
  bool success = 1;
}

message ListScopesRequest {
  string scope_regex = 1;
  string series_regex = 2;
  bool with_stats = 3;
}

message Scope {
  string scope_handle = 1;
  string scope_name = 2;
  repeated Series series_list = 3;
}

message Series {
  string series_handle = 1;
  string series_name = 2;
  google.protobuf.Struct structure = 3;
  repeated Field fields = 4;
  Stats stats = 5;
}

message Field {
  string field_handle = 1;
  string field_name = 2;
  string field_type = 3;
}

message Stats {
  uint32 num_points = 1;
  uint32 num_chunks = 2;
}

message ListScopesResponse {
    Scope scope = 1;
}



service Service {
  rpc MakeOrGetScope (GetScopeRequest) returns (GetScopeResponse);
  rpc DeleteScope (DeleteScopeRequest) returns (DeleteScopeResponse);
  rpc MakeOrGetSeries (GetSeriesRequest) returns (GetSeriesResponse);
  rpc AppendToSeries (AppendToSeriesRequest) returns (AppendToSeriesResponse);
  rpc ListScopes (ListScopesRequest) returns (stream ListScopesResponse);
  // rpc ListSeries (ListSeriesRequest) returns (stream ListSeriesResponse);
  // rpc ListFieldData (ListFieldDataRequest) returns (stream FieldDataResponse);
}
