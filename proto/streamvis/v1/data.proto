syntax = "proto3";
package streamvis.v1;

option go_package = "pier/pb/streamvis/v1;streamvis_v1";

/*
import "google/protobuf/struct.proto";
*/
import "google/protobuf/timestamp.proto";

message CreateFieldRequest {
  string name = 1;
  string data_type = 2;
  string description = 3;
}

message CreateFieldResponse {
}


message EncTyp {
  FieldDataType data_type = 1;
  repeated float floats = 2;
  repeated bool bools = 3;
  repeated string texts = 4;
  optional DiffArray diff_array = 5;
}

message DiffArray {
  int32 base = 1;
  repeated int32 diff = 2;
  int32 size = 3;
}

message FullEncTyp {
  string field_handle = 1;
  EncTyp enc = 2;
}

message IntArray {
  repeated int32 values = 1;
}

message IntValues {
  repeated OptionalInt values = 1;
}

message OptionalInt {
  optional int32 value = 1;
}

message FloatArray {
  repeated float values = 2;
}

message FloatValues {
  repeated OptionalFloat values = 1;
}

message OptionalFloat {
  optional float value = 1;
}

message BoolArray {
  repeated bool values = 1;
}

message StringArray {
  repeated string values = 1;
}


message AppendToRunRequest {
  string run_handle = 1;
  repeated FullEncTyp field_vals = 2;
}

message AppendToRunResponse {
}

message CreateRunRequest { }

message CreateRunResponse {
  string run_handle = 1;
}

message ReplaceRunRequest {
  string run_handle = 1;
}

message ReplaceRunResponse {
}

message DeleteRunRequest {
  string run_handle = 1;
}

message DeleteRunResponse {
}

enum FieldDataType {
  FIELD_DATA_TYPE_UNSPECIFIED = 0;
  FIELD_DATA_TYPE_INT = 1;
  FIELD_DATA_TYPE_FLOAT = 2;
  FIELD_DATA_TYPE_TEXT = 3;
  FIELD_DATA_TYPE_BOOL = 4;
}

message FieldValue {
  string handle = 1;
  oneof value {
    int32 int_val = 2;
    float float_val = 3;
    string text_val = 4;
    bool bool_val = 5;
  }
}

message SetRunAttributesRequest {
  string run_handle = 1;
  repeated FieldValue attrs = 2;
}

message SetRunAttributesResponse {
}

message AddRunTagsRequest {
  string run_handle = 1;
  repeated string tags = 2;
}

message AddRunTagsResponse {}

message DeleteRunTagRequest {
  string run_handle = 1;
  string tag = 2;
}

message DeleteRunTagResponse {}

message Field {
  string handle = 1;
  string name = 2;
  FieldDataType data_type = 3;
  string description = 4;
}

message ListAttributeValuesRequest {}

message AnyArray {
  oneof value {
    IntArray ints = 1;
    FloatArray floats = 2;
    StringArray strings = 3;
    BoolArray bools = 4;
  }
}

message AttributeValues {
  Field field = 1;
  AnyArray values = 2;
}


message ListFieldsRequest {}

message RunFilter {
  repeated AttributeFilter attribute_filters = 1;
  TagFilter tag_filter = 2;
  google.protobuf.Timestamp min_started_at = 3;
  google.protobuf.Timestamp max_started_at = 4;
}

message Run {
  string handle = 1;
  repeated string tags = 2;
  google.protobuf.Timestamp started_at = 3;
  map<string, FieldValue> attrs = 4;
}

message RunId {
  string handle = 1;
}

message ListStartedAtRequest {}

message RunStartTime {
  google.protobuf.Timestamp started_at = 3;
}

message ListTagsRequest {}

message TagValue {
  string tag = 1;
}

message ChunkData {
  /* ordered collection of field data */
  repeated EncTyp enc_vals = 1;
}

message RunChunks {
  /* chunks belonging to the same query. each chunk has the same fields in the same
   * order, specified by QueryRunDataRequest */
  string run_handle = 1;
  repeated ChunkData chunks = 2;
}

message IntList {
  repeated int32 vals = 1;
}

message IntRange {
  optional int32 imin = 1;
  optional int32 imax = 2;
}

message FloatRange {
  optional float fmin = 1;
  optional float fmax = 2;
}

message BoolList {
  repeated bool vals = 1;
}

message StringList {
  repeated string vals = 1;
}

message AttributeFilter {
  string field_handle = 1;
  bool include_missing = 2;
  oneof value {
    IntRange int_range = 3;
    IntList int_list = 4;
    FloatRange float_range = 5;
    BoolList bool_list = 6;
    StringList string_list = 7;
  }
}

message TagFilter {
  repeated string pos_tags = 1;
  bool pos_match_all = 2; 
  repeated string neg_tags = 3;
  bool neg_match_all = 4;
}

message ListRunsRequest {
  RunFilter run_filter = 1;
}

message GetEndChunkIdRequest {}

message GetEndChunkIdResponse {
  int64 id = 1;
}

message QueryRunDataRequest {
  // will retrieve chunk data for any chunks containing all of the requested fields
  // and passing the given filters
  repeated string field_handles = 1;
  optional int64 begin_chunk_id = 2;
  optional int64 end_chunk_id = 3;
  RunFilter run_filter = 4;
  optional WindowSpec window_spec = 5;
}

message WindowSpec {
  repeated string group_field_handles = 1;
  string order_field_handle = 2;
  uint32 size = 3;
  uint32 stride = 4;
}


message ListCommonAttributesRequest {
  RunFilter run_filter = 1;
}


service Service {
  rpc CreateField (CreateFieldRequest) returns (CreateFieldResponse);
  rpc AppendToRun (AppendToRunRequest) returns (AppendToRunResponse);
  rpc CreateRun (CreateRunRequest) returns (CreateRunResponse);
  rpc ReplaceRun (ReplaceRunRequest) returns (ReplaceRunResponse);
  rpc DeleteRun (DeleteRunRequest) returns (DeleteRunResponse);
  rpc SetRunAttributes (SetRunAttributesRequest) returns (SetRunAttributesResponse);
  rpc AddRunTags (AddRunTagsRequest) returns (AddRunTagsResponse);
  rpc DeleteRunTag (DeleteRunTagRequest) returns (DeleteRunTagResponse);
  rpc ListFields (ListFieldsRequest) returns (stream Field);
  rpc ListRuns (ListRunsRequest) returns (stream Run);
  rpc GetEndChunkId (GetEndChunkIdRequest) returns (GetEndChunkIdResponse);
  rpc QueryRunData (QueryRunDataRequest) returns (stream RunChunks);
  rpc ListCommonAttributes (ListCommonAttributesRequest) returns (stream Field);
  rpc ListStartedAt (ListStartedAtRequest) returns (stream RunStartTime);
  rpc ListTags (ListTagsRequest) returns (stream TagValue);
  rpc ListAttributeValues (ListAttributeValuesRequest) returns (stream AttributeValues);
}
