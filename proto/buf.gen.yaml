version: v2
plugins: 
  - local: protoc-gen-go
    out: ../pier/pb 
    opt: [paths=source_relative]

  - local: protoc-gen-connect-go
    out: ../pier/pb 
    opt: 
      - paths=source_relative
      - simple

  - remote: buf.build/bufbuild/es
    out: ../web-client/src/gen
    include_imports: true
    opt: 
      - target=js
      - import_extension=none

